<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رمز التحقق</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; color: #f8fafc; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #1e293b; padding: 2rem; border-radius: 1rem; width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #2dd4bf; }
        input, button { width: 100%; padding: 0.75rem; margin: 0.5rem 0; border: 1px solid #334155; border-radius: 0.5rem; background-color: #0f172a; color: #f8fafc; box-sizing: border-box; }
        button { background-color: #2dd4bf; color: #0f172a; font-weight: bold; cursor: pointer; border: none; }
        .alert { padding: 0.75rem; margin-bottom: 1rem; border-radius: 0.5rem; }
        .alert-danger { background-color: #7f1d1d; color: #fca5a5; }
    </style>
</head>
<body>
    <div class="container">
        <h2>أدخل رمز التحقق</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}
        <form action="/verify-code" method="POST">
            <input type="text" name="code" placeholder="الرمز المرسل إلى تيليجرام" required>
            <button type="submit">تأكيد</button>
        </form>
    </div>
</body>
</html>
